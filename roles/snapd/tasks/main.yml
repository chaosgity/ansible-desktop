- name: Install snapd (for non-Ubuntu systems)
  ansible.builtin.package:
    name: snapd
    state: present

- name: Enable and start snapd socket
  ansible.builtin.systemd:
    name: snapd.socket
    state: started
    enabled: true

- name: Create symlink for classic snap support (non-Debian)
  ansible.builtin.file:
    src: /var/lib/snapd/snap
    dest: /snap
    state: link
  when: ansible_os_family != "Debian"

- name: Wait for snapd to be ready
  ansible.builtin.command:
    cmd: snap wait system seed.loaded
  changed_when: false

- name: Install snap package
  community.general.snap:
    name: htop
    state: present   
