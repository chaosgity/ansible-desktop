- user: name=aurbuilder

- lineinfile:
    path: /etc/sudoers.d/aurbuilder-allow-to-sudo-shelly
    line: "{{ item.line }}"
    state: present
    validate: /usr/sbin/visudo -cf %s
    create: yes
  loop:  
    - { line: 'aurbuilder ALL=(ALL) NOPASSWD: /usr/bin/shelly' }
    - { line: 'Defaults:aurbuilder !requiretty' }

- name: Install packages with Shell-CLI
  ansible.builtin.command: shelly install ventoy-bin --no-confirm
  become: yes
  become_user: aurbuilder

