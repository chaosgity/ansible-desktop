- user:
    name: aurbuilder
    group: wheel

- lineinfile:
    path: /etc/sudoers.d/11-install-aurbuilder
    line: 'aurbuilder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
    create: yes
    validate: 'visudo -cf %s'

- aur: name=yay
  become: yes
  become_user: aurbuilder

- aur:
    use: yay
    name:
      - htop
      - downgrade
  become: yes
  become_user: aurbuilder
