- mame: create alacritty config dir
  file:
    path: "{{ ansible_env.HOME }}/.config/alacritty"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: copy alacritty config file
  copy:
    src: alacritty.toml
    dest: "{{ ansible_env.HOME }}/.config/alacritty"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
